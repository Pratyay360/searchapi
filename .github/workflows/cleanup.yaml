name: Cleanup Workflow Runs
on:
  workflow_dispatch:
  
permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          owner="${{ github.repository_owner }}"
          repo="${{ github.event.repository.name }}"
          current_run="${{ github.run_id }}"

          echo "Fetching workflow list for $owner/$repo..."

          # Iterate over each workflow to handle keep-per-workflow correctly
          gh api /repos/$owner/$repo/actions/workflows --paginate \
            | jq -r '.workflows[].id' \
            | while read -r workflow_id; do

            echo "Processing workflow ID: $workflow_id"

            # Build status filter flag
            status_flag=""
            [ "$status" != "all" ] && status_flag="&status=$status"

            # Fetch all runs for this workflow, skip current run, skip first N (keep)
            gh api "/repos/$owner/$repo/actions/runs?workflow_id=$workflow_id&per_page=100${status_flag}" \
              --paginate \
              | jq -r '.workflow_runs[].id' \
              | grep -v "^$current_run$" \
              | while read -r run_id; do
                echo "Deleting run $run_id"
                gh api -X DELETE /repos/$owner/$repo/actions/runs/$run_id \
                  && echo "Deleted $run_id" \
                  || echo "Failed to delete $run_id (may already be gone)"
              done
          done

          echo "Done."
          

